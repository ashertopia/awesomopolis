// Audio
let audioCtx=null;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function beep(f,d,v,t='sine',delay=0){
  try{const a=getAC(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,a.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+delay+d);
    o.start(a.currentTime+delay);o.stop(a.currentTime+delay+d);}catch(e){}
}
function playMiss(){beep(200,0.4,0.3,'sawtooth');beep(150,0.3,0.2,'sawtooth',0.15);}
function playCatch(){beep(660,0.07,0.18);beep(880,0.1,0.18,'sine',0.07);}
function playGood(){beep(440,0.08,0.2);beep(660,0.08,0.2,'sine',0.09);beep(880,0.12,0.2,'sine',0.18);}
function playBad(){beep(300,0.12,0.25,'sawtooth');beep(180,0.2,0.25,'sawtooth',0.13);}

const SCRIPT_URL='https://script.google.com/macros/s/AKfycbx30JfEZsuQf-h7mq5Qc5nOUB7UO4dWOOKMxsXNRDcMX-wHW1PQIUTzSgHJIf-jwMhp/exec';

// Fetch leaderboard from Google Sheet
function fetchLB(el){
  if(el) el.innerHTML='<div class="sdesc" style="opacity:0.5">Loading...</div>';
  fetch(SCRIPT_URL)
    .then(r=>r.json())
    .then(lb=>{
      if(!el) return;
      if(!lb.length){el.innerHTML='<div class="sdesc" style="opacity:0.5">No scores yet!</div>';return;}
      el.innerHTML=lb.slice(0,7).map((e,i)=>
        `<div class="lbrow ${i===0?'gold':''}"><span>#${i+1} ${e.name}</span><span>${e.score}</span></div>`
      ).join('');
    })
    .catch(()=>{if(el)el.innerHTML='<div class="sdesc" style="opacity:0.5">Leaderboard unavailable</div>';});
}

// Save score via GET (avoids CORS issues with Apps Script)
function saveScore(name,score){
  const url=SCRIPT_URL+'?name='+encodeURIComponent(name)+'&score='+encodeURIComponent(score);
  return fetch(url).catch(()=>{});
}

// Game state
let best=0;
let state='menu',score=0,lives=3,shield=false,immuneT=0;
const TW=240,TH=288;
const TX_MIN=-Math.round(TW*0.40);
const TX_MAX=W-Math.round(TW*0.60);
const TY=H-TH+Math.round(TH*0.06);
let tx=(TX_MIN+TX_MAX)/2;
let TSPD=5,tornadoTimer=0;

const CZ_L=0.24,CZ_R=0.76,CZ_T=0.44,CZ_B=0.62;

let lHeld=false,rHeld=false;
let pacs=[],powerups=[],fx=[];
let slowT=0,doubleT=0,missT=0,catchT=0;
let magnetActive=false,magnetTimer=0,spawnSlowTimer=0;
let totalCaught=0,spawnCountdown=130,fid;
let nextPuAt=10;

function getLvl(){return Math.min(totalCaught,150);}
function getPacSpeed(){
  const lvl=getLvl();
  let base;
  if(lvl<20)       base=1.0+(lvl/20)*1.2;
  else if(lvl<60)  base=2.2+((lvl-20)/40)*2.3;
  else if(lvl<100) base=4.5+((lvl-60)/40)*2.0;
  else             base=6.5+((lvl-100)/50)*1.5;
  return base*(slowT>0?0.32:1);
}
function getSpawnInterval(){
  const lvl=getLvl();
  const base=Math.max(28,Math.round(145-(lvl/150)*117));
  return spawnSlowTimer>0?Math.round(base*2.2):base;
}
function getPacDrift(lvl){
  if(lvl<40)return 0;
  return Math.min(1.8,(lvl-40)/60*1.8);
}
function getPuInterval(){
  const lvl=getLvl();
  if(lvl<10)return 10;
  if(lvl<50)return 7;
  return 4;
}

const PU_TYPES=[
  ['immune', 'IMMUNITY!',    true,  4,2],
  ['magnet', 'MAGNET!',      true,  3,2],
  ['shield', 'SHIELD!',      true,  2,1],
  ['slow',   'SLOW DOWN!',   true,  3,2],
  ['double', 'x2 POINTS!',   true,  3,2],
  ['tornado','SPEED BOOST!', true,  2,2],
  ['addlife','+1 LIFE!',     true,  1,1],
  ['bomb',   'BOMB!',        false, 1,4],
  ['fire',   'SPEED SURGE!', false, 1,5],
];

function pickPuType(){
  const lvl=getLvl(),ti=lvl>=50?1:0,pool=[];
  PU_TYPES.forEach(p=>{for(let i=0;i<p[3+ti];i++)pool.push(p);});
  return pool[Math.floor(Math.random()*pool.length)];
}

function updateHUD(){
  document.getElementById('scoreEl').textContent='Score: '+score+(doubleT>0?' ✖2!':'');
  document.getElementById('bestEl').textContent='Best: '+best;
  let h='';
  for(let i=0;i<Math.max(3,lives);i++)
    h+=i<lives?(shield&&i===lives-1?'🛡':'🩷'):'🖤';
  document.getElementById('livesEl').textContent=h;
}

function showNotice(msg,col){
  const el=document.getElementById('noticeEl');
  el.textContent=msg;el.style.color=col||'#ffe600';el.style.opacity=1;
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity=0,1700);
}

function drawImg(img,x,y,w,h){try{ctx.drawImage(img,x,y,w,h);}catch(e){}}

function drawPuIcon(type,x,y,sz){
  const val=PU_ICONS[type];
  if(!val)return;
  if(val==='x2'){
    ctx.save();
    ctx.font=`bold ${Math.round(sz*0.65)}px Arial`;
    ctx.fillStyle='#cc44ff';ctx.strokeStyle='#fff';ctx.lineWidth=3;
    ctx.strokeText('X2',x+sz*0.08,y+sz*0.78);
    ctx.fillText('X2',x+sz*0.08,y+sz*0.78);
    ctx.restore();
  }else{
    drawImg(val,x,y,sz,sz);
  }
}

function loop(){
  ctx.clearRect(0,0,W,H);
  drawImg(iBg,0,0,W,H);
  if(state!=='playing'){fid=requestAnimationFrame(loop);return;}

  const tspd=tornadoTimer>0?TSPD*4.5:TSPD;
  if(lHeld)tx=Math.max(TX_MIN,tx-tspd);
  if(rHeld)tx=Math.min(TX_MAX,tx+tspd);

  spawnCountdown--;
  if(spawnCountdown<=0){
    const lvl=getLvl(),drift=getPacDrift(lvl);
    const driftDir=(Math.random()<0.5?1:-1)*drift*(0.4+Math.random()*0.4);
    const startX=15+Math.random()*(W-95);
    pacs.push({x:startX,y:-90,w:65,h:73,dx:driftDir,flip:Math.random()<0.5});
    spawnCountdown=getSpawnInterval();
  }

  if(slowT>0)slowT--;
  if(doubleT>0){doubleT--;if(doubleT===0)updateHUD();}
  if(magnetTimer>0)magnetTimer--;else magnetActive=false;
  if(spawnSlowTimer>0)spawnSlowTimer--;
  if(missT>0)missT--;
  if(catchT>0)catchT--;
  if(tornadoTimer>0)tornadoTimer--;
  if(immuneT>0)immuneT--;

  const spd=getPacSpeed();
  const catchL  =tx+Math.round(TW*CZ_L);
  const catchR  =tx+Math.round(TW*CZ_R);
  const catchTop=TY+Math.round(TH*CZ_T);
  const catchBot=TY+Math.round(TH*CZ_B);

  const nearPac=pacs.some(p=>{
    const pcx=p.x+p.w/2;
    return p.y+p.h>catchTop-230&&p.y<catchBot&&pcx>catchL-50&&pcx<catchR+50;
  });

  // 1. Draw Tinlee
  let tImg=iTinCatch;
  if(missT>0)tImg=iTinMiss;
  else if(catchT>0)tImg=iTinCatch;
  else if(nearPac)tImg=iTinAnti;
  drawImg(tImg,tx,TY,TW,TH);

  // 2. Pacifiers on top
  for(let i=pacs.length-1;i>=0;i--){
    const p=pacs[i];
    if(magnetActive){const tx2=tx+TW/2-p.w/2;p.x+=(tx2-p.x)*0.07;}
    p.y+=spd;
    if(p.surge>0){p.y+=2.5;p.surge--;}
    p.x+=p.dx||0;
    // Keep pac catchable - never fully off screen
    if(p.x<0)p.x=0;
    if(p.x>W-p.w)p.x=W-p.w;

    const pacImg=p.flip?iPacMF:iPacM;
    drawImg(pacImg,p.x,p.y,p.w,p.h);

    const cx=p.x+p.w/2,cy=p.y+p.h*0.70;
    if(cy>=catchTop&&cy<=catchBot+15&&cx>=catchL&&cx<=catchR){
      pacs.splice(i,1);totalCaught++;
      const pts=doubleT>0?2:1;
      score+=pts;if(score>best)best=score;
      playCatch();updateHUD();missT=0;catchT=55;
      if(totalCaught>=nextPuAt){
        nextPuAt=totalCaught+getPuInterval();
        powerups.push({x:Math.random()*(W-55),y:-70,ptype:pickPuType()});
      }
    }else if(p.y>H){
      pacs.splice(i,1);
      if(immuneT>0){showNotice('⭐ IMMUNE!','#ffe600');}
      else if(shield){shield=false;updateHUD();showNotice('🛡 BLOCKED!','#88ffee');}
      else{
        lives--;updateHUD();playMiss();missT=80;catchT=0;
        if(lives<=0){endGame();return;}
      }
    }
  }

  // 3. Powerups on top
  const PU_SZ=52;
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];p.y+=spd*0.65;
    drawPuIcon(p.ptype[0],p.x,p.y,PU_SZ);
    const cx=p.x+PU_SZ/2,cy=p.y+PU_SZ;
    if(cy>=catchTop&&cy<=catchBot+15&&cx>=catchL&&cx<=catchR){
      powerups.splice(i,1);
      const pt=p.ptype;
      pt[2]?playGood():playBad();
      switch(pt[0]){
        case 'immune':  immuneT=360;showNotice('⭐ IMMUNITY!','#ffe600');break;
        case 'slow':    slowT=280;showNotice('🕐 SLOW DOWN!','#aaffaa');break;
        case 'magnet':  magnetActive=true;magnetTimer=320;showNotice('🧲 MAGNET!','#88ffff');break;
        case 'shield':  shield=true;updateHUD();showNotice('🛡 SHIELD!','#88ffee');break;
        case 'double':  doubleT=340;updateHUD();showNotice('✖2 DOUBLE!','#ff88ff');break;
        case 'tornado': tornadoTimer=300;showNotice('🌪 SPEED BOOST!','#88ffff');break;
        case 'addlife':
          if(lives<5){lives++;updateHUD();showNotice('❤ +1 LIFE!','#ff88aa');}
          else showNotice('❤ MAX LIVES!','#ff88aa');
          break;
        case 'bomb':
          if(immuneT>0)showNotice('⭐ IMMUNE!','#ffe600');
          else if(shield){shield=false;updateHUD();showNotice('🛡 BLOCKED!','#88ffee');}
          else{lives=Math.max(0,lives-1);updateHUD();playMiss();missT=70;showNotice('💣 BOMB!','#ff4444');if(lives<=0){endGame();return;}}
          break;
        case 'fire':
          slowT=0;showNotice('🔥 SPEED SURGE!','#ff6600');
          pacs.forEach(p=>p.surge=90);break;
      }
    }else if(p.y>H)powerups.splice(i,1);
  }

  // Effects
  for(let i=fx.length-1;i>=0;i--){
    const e=fx[i];
    ctx.globalAlpha=Math.min(1,e.life/16);
    if(e.big){ctx.font='40px serif';ctx.fillText(e.txt,e.x-18,e.y);}
    else{ctx.font='bold 20px Arial';ctx.fillStyle=e.col;ctx.fillText(e.txt,e.x-10,e.y-(32-e.life)*1.7);}
    ctx.globalAlpha=1;e.life--;if(e.life<=0)fx.splice(i,1);
  }

  fid=requestAnimationFrame(loop);
}

function startGame(){
  score=0;lives=3;shield=false;immuneT=0;tx=(TX_MIN+TX_MAX)/2;
  pacs=[];powerups=[];fx=[];
  slowT=0;doubleT=0;missT=0;catchT=0;
  magnetActive=false;magnetTimer=0;spawnSlowTimer=0;tornadoTimer=0;
  totalCaught=0;spawnCountdown=130;nextPuAt=getPuInterval();
  updateHUD();
  document.getElementById('screen').style.display='none';
  state='playing';
  if(fid)cancelAnimationFrame(fid);
  loop();
}

function endGame(){
  state='over';cancelAnimationFrame(fid);pacs=[];powerups=[];
  const name=(prompt('Enter your name for the leaderboard:','Player')||'Player').trim().slice(0,14)||'Player';
  best=Math.max(best,score);
  const s=document.getElementById('screen');
  s.innerHTML=`
    <img style="width:120px;height:auto;border-radius:50%;object-fit:cover;border:4px solid #ffd700;margin-bottom:5px;" src="${iTinWin.src}">
    <div class="stitle" style="color:#ffd700">Game Over!</div>
    <div class="sdesc" style="font-size:17px;margin:3px 0">Score: <strong style="color:#ff8fab">${score}</strong></div>
    <div class="sdesc" style="color:#ffd700">&#x1F3C6; Best: <strong>${best}</strong></div>
    <div style="color:#ffd700;font-size:12px;font-weight:bold;margin:6px 0 2px;">🏆 Leaderboard</div>
    <div id="endLB"></div>
    <button class="sbtn" onclick="startGame()">Play Again!</button>`;
  s.style.display='flex';
  fid=requestAnimationFrame(loop);
  // Save score via GET then fetch updated leaderboard
  const saveUrl=SCRIPT_URL+'?name='+encodeURIComponent(name)+'&score='+encodeURIComponent(score);
  fetch(saveUrl)
    .then(r=>r.json())
    .then(lb=>{
      const el=document.getElementById('endLB');
      if(!el)return;
      if(!lb.length){el.innerHTML='<div class="sdesc" style="opacity:0.5">No scores yet!</div>';return;}
      el.innerHTML=lb.slice(0,7).map((e,i)=>
        `<div class="lbrow ${i===0?'gold':''}"><span>#${i+1} ${e.name}</span><span>${e.score}</span></div>`
      ).join('');
    })
    .catch(()=>fetchLB(document.getElementById('endLB')));
}

document.getElementById('playBtn').onclick=startGame;
document.getElementById('bestEl').textContent='Best: '+best;

// Touch controls
const ta=document.getElementById('touchArea');
let AT={};
function uh(){
  lHeld=false;rHeld=false;
  Object.values(AT).forEach(t=>{
    const r=c.getBoundingClientRect();
    if((t.clientX-r.left)*(W/r.width)<W/2)lHeld=true;else rHeld=true;
  });
}
ta.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches)AT[t.identifier]={clientX:t.clientX};uh();},{passive:false});
ta.addEventListener('touchmove', e=>{e.preventDefault();for(const t of e.changedTouches)AT[t.identifier]={clientX:t.clientX};uh();},{passive:false});
ta.addEventListener('touchend',  e=>{e.preventDefault();for(const t of e.changedTouches)delete AT[t.identifier];uh();},{passive:false});
ta.addEventListener('touchcancel',()=>{AT={};lHeld=false;rHeld=false;});
ta.addEventListener('mousedown',e=>{const r=c.getBoundingClientRect();((e.clientX-r.left)*(W/r.width)<W/2)?lHeld=true:rHeld=true;});
document.addEventListener('mouseup',()=>{lHeld=false;rHeld=false;});
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')lHeld=true;if(e.key==='ArrowRight')rHeld=true;});
document.addEventListener('keyup',  e=>{if(e.key==='ArrowLeft')lHeld=false;if(e.key==='ArrowRight')rHeld=false;});

loop();
</script>
